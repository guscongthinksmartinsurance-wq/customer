<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: serif; display: flex; justify-content: center; padding: 20px; }
        .card { max-width: 450px; width: 100%; border: 1px solid #c5a059; padding: 40px; text-align: center; }
        .btn { display: block; padding: 18px; background: #c5a059; color: #000; text-decoration: none; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>
    <div id="main" class="card">Đang mở hồ sơ...</div>
    <script>
        try {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            const data = JSON.parse(decodeURIComponent(escape(atob(d))));
            document.getElementById('main').innerHTML = `
                <div style="color:#c5a059; letter-spacing:5px;">NATIONAL LIFE GROUP</div>
                <p style="font-size:12px; color:#666;">Người hỗ trợ: ${data.s}</p>
                <div style="border-bottom:1px solid #333; margin:20px 0;"></div>
                <h2>${data.n}</h2>
                <p style="color:#888;">Hồ sơ số: ${data.p}</p>
                <a href="${data.u}" class="btn" download="Bang-Bao-Gia.pdf">Tải Bảng Báo Giá PDF</a>
                <div style="margin-top:30px; font-size:10px; color:#444;">Bảo mật bởi ThinkSmart Insurance</div>
            `;
        } catch(e) { document.getElementById('main').innerHTML = "Lỗi truy cập."; }
    </script>
</body>
</html>
