<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkSmart Insurance - Secure Secure Portal</title>
    <style>
        /* Tông màu Corporate: Sạch sẽ, Vững chãi, Tin cậy */
        :root {
            --corporate-blue: #003366; 
            --light-bg: #f9fafb;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.08);
            --text-main: #222;
        }

        body { 
            background-color: var(--light-bg); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; /* Font không chân chuyên nghiệp */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .card { 
            max-width: 420px; 
            width: 100%; 
            background: #fff; 
            border-radius: 12px; 
            padding: 45px; 
            text-align: center; 
            box-shadow: var(--card-shadow); 
            border-top: 6px solid var(--corporate-blue); /* Điểm nhấn Corporate */
        }

        .brand-header {
            margin-bottom: 30px;
        }

        .brand-logo { 
            color: var(--corporate-blue); 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-size: 15px; 
            font-weight: 700; 
        }

        .manager-label { 
            color: #777; 
            font-size: 12px; 
            margin: 5px 0 0 0; 
            font-weight: 500;
        }

        .staff-label { 
            color: #888; 
            font-size: 11px; 
            margin: 3px 0 0 0; 
        }

        .divider { 
            border-bottom: 1px solid #e5e7eb; 
            margin: 25px 0; 
        }

        h2 { 
            font-weight: 700; 
            font-size: 30px; 
            margin: 0; 
            color: #111; 
        }

        .phone-label { 
            color: #777; 
            font-size: 14px; 
            margin: 8px 0 0 0; 
            font-family: monospace; /* Chuyên nghiệp cho SĐT */
        }

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 18px; 
            background-color: var(--corporate-blue); 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-top: 40px; 
            letter-spacing: 1.5px; 
            border-radius: 6px; 
            font-size: 15px; 
            transition: background 0.2s; 
        }
        
        .btn:hover { 
            background-color: #004d99;
        }

        /* Thêm icon PDF nhỏ */
        .btn-icon {
            margin-right: 10px;
            font-size: 18px;
        }

        .footer { 
            margin-top: 50px; 
            font-size: 11px; 
            color: #aaa; 
            border-top: 1px solid #f3f4f6; 
            padding-top: 20px; 
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="main" class="card">Đang mở hồ sơ bảo mật...</div>
    <script>
        try {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            if (d) {
                const data = JSON.parse(decodeURIComponent(escape(atob(d))));
                document.getElementById('main').innerHTML = `
                    <div class="brand-header">
                        <div class="brand-logo">National Life Group</div>
                        <p class="manager-label">Sale Manager: Công Thái</p>
                        <p class="staff-label">Người hỗ trợ: ${data.s}</p>
                    </div>
                    <div class="divider"></div>
                    <h2>${data.n || "Khách hàng"}</h2>
                    <p class="phone-label">Mã định danh (US): ${data.p || "Bảo mật"}</p>
                    <a href="${data.u}" class="btn" target="_blank">
                        <span class="btn-icon">📄</span> Xem Bảng Báo Giá (PDF)
                    </a>
                    <div class="footer">Đây là hồ sơ cá nhân bảo mật, được mã hóa. <br> Tự động hủy sau 24h.</div>
                `;
            } else {
                document.getElementById('main').innerHTML = "Lỗi truy cập hoặc hồ sơ đã hết hạn.";
            }
        } catch (e) { document.getElementById('main').innerHTML = "Lỗi mã hóa dữ liệu. Không thể mở hồ sơ."; }
    </script>
</body>
</html>
