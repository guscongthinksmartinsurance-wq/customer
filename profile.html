<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --corporate-blue: #003366; --light-bg: #f9fafb; }
        body { background-color: var(--light-bg); color: #222; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { max-width: 420px; width: 100%; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 6px solid var(--corporate-blue); }
        .ad-img { width: 100%; height: auto; display: block; background: #eee; }
        .content { padding: 35px; text-align: center; }
        .brand-logo { color: var(--corporate-blue); letter-spacing: 2px; text-transform: uppercase; font-size: 14px; font-weight: 700; margin-bottom: 5px; }
        .manager { color: #777; font-size: 12px; margin: 0; }
        .divider { border-bottom: 1px solid #eee; margin: 25px 0; }
        h2 { font-weight: 700; font-size: 28px; margin: 0; color: #111; }
        .btn { display: flex; align-items: center; justify-content: center; padding: 18px; background: var(--corporate-blue); color: #fff; text-decoration: none; font-weight: bold; text-transform: uppercase; margin-top: 30px; border-radius: 6px; letter-spacing: 1px; }
        .footer { margin-top: 40px; font-size: 10px; color: #aaa; border-top: 1px solid #f9f9f9; padding-top: 15px; }
    </style>
</head>
<body>
    <div id="main" class="card">Đang mở hồ sơ...</div>
    <script>
        try {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            const data = JSON.parse(decodeURIComponent(escape(atob(d))));
            document.getElementById('main').innerHTML = `
                <img src="${data.i}" class="ad-img" alt="Illustration">
                <div class="content">
                    <div class="brand-logo">National Life Group</div>
                    <p class="manager">Sale Manager: Công Nguyễn</p>
                    <p style="font-size:10px; color:#999; margin:3px 0;">Consultant: ${data.s}</p>
                    <div class="divider"></div>
                    <h2>${data.n}</h2>
                    <p style="color:#777; font-size:14px; margin-top:10px;">ID: ${data.p}</p>
                    <a href="${data.u}" class="btn" target="_blank">📄 Xem Bảng Báo Giá PDF</a>
                    <div class="footer">Hồ sơ cá nhân bảo mật. Mã hóa 256-bit. <br> Tự động hủy sau 24h.</div>
                </div>
            `;
        } catch(e) { document.getElementById('main').innerHTML = "Lỗi truy cập hồ sơ."; }
    </script>
</body>
</html>
