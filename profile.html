<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Life Group - Portal</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { max-width: 400px; width: 100%; border: 1px solid #c5a059; padding: 40px; text-align: center; }
        .brand { color: #c5a059; letter-spacing: 5px; text-transform: uppercase; font-size: 14px; }
        .btn { display: block; padding: 18px; background: #c5a059; color: #000; text-decoration: none; font-weight: bold; margin-top: 30px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="main" class="card">Đang mở hồ sơ bảo mật...</div>
    <script>
        try {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            const data = JSON.parse(decodeURIComponent(escape(atob(d))));
            document.getElementById('main').innerHTML = `
                <div class="brand">National Life Group</div>
                <p style="color:#666; font-size:12px; margin-top:5px;">Người hỗ trợ: ${data.s}</p>
                <div style="border-bottom:1px solid #333; margin:20px 0;"></div>
                <h2 style="font-weight:normal;">${data.n}</h2>
                <p style="color:#888; font-size:13px;">Số điện thoại: ${data.p}</p>
                <a href="${data.u}" class="btn" target="_blank">Xem Bảng Báo Giá PDF</a>
                <div style="margin-top:40px; font-size:10px; color:#444;">Hồ sơ tự động hủy sau 24h để bảo mật.</div>
            `;
        } catch(e) { document.getElementById('main').innerHTML = "Lỗi truy cập hoặc hồ sơ đã hết hạn."; }
    </script>
</body>
</html>
