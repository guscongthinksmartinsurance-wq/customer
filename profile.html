<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Life Group - Secure Portal</title>
    <style>
        /* Đổi nền trắng sáng để tạo cảm giác minh bạch */
        body { 
            background-color: #f4f4f7; 
            color: #333; 
            font-family: "Times New Roman", Times, serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        /* Card trắng, đổ bóng nhẹ để tạo chiều sâu và sự tập trung */
        .card { 
            max-width: 420px; 
            width: 100%; 
            background-color: #ffffff; 
            border: 1px solid #e1e1e1; 
            border-radius: 8px; 
            padding: 40px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        /* Logo và Manager sẫm màu hơn trên nền trắng */
        .brand { 
            color: #c5a059; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            font-size: 16px; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        .manager-info { 
            font-size: 12px; 
            color: #666; 
            margin: 0; 
            font-style: italic; 
        }

        /* Đường gạch ngang mảnh, tinh tế */
        .divider { 
            border-bottom: 1px solid #eee; 
            margin: 30px 0; 
        }

        /* Tên khách hàng nổi bật nhất, màu đen */
        h2 { 
            font-weight: normal; 
            font-size: 32px; 
            margin: 0 0 10px 0; 
            color: #1a1a1a; 
        }
        .client-phone { 
            color: #888; 
            font-size: 14px; 
            margin: 0; 
        }

        /* Nút Vàng Gold trên nền trắng nhìn rất sang và rõ ràng */
        .btn { 
            display: block; 
            padding: 20px; 
            background-color: #c5a059; 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-top: 40px; 
            letter-spacing: 2px; 
            border-radius: 4px; 
            transition: background-color 0.3s; 
        }
        .btn:hover { 
            background-color: #b38f4a; 
        }

        /* Footer sáng, dễ đọc */
        .footer { 
            margin-top: 50px; 
            font-size: 11px; 
            color: #999; 
            border-top: 1px solid #fafafa; 
            padding-top: 20px; 
        }
    </style>
</head>
<body>
    <div id="main" class="card">Đang mở hồ sơ bảo mật...</div>

    <script>
        try {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            if (d) {
                const data = JSON.parse(decodeURIComponent(escape(atob(d))));
                document.getElementById('main').innerHTML = `
                    <div class="brand">National Life Group</div>
                    <p class="manager-info">Sale Manager: Công Nguyễn</p>
                    <p class="manager-info" style="font-size: 11px;">Hỗ trợ bởi: ${data.s}</p>
                    <div class="divider"></div>
                    <h2>${data.n || "Khách hàng"}</h2>
                    <p class="client-phone">Số điện thoại định danh: ${data.p || "N/A"}</p>
                    <a href="${data.u}" class="btn" target="_blank">Xem Bảng Báo Giá PDF</a>
                    <div class="footer">Đây là hồ sơ cá nhân bảo mật. Tự động hủy sau 24h.</div>
                `;
            } else {
                document.getElementById('main').innerHTML = "Lỗi truy cập. Vui lòng liên hệ Tư vấn viên.";
            }
        } catch (e) { 
            document.getElementById('main').innerHTML = "Lỗi mã hóa dữ liệu. Không thể mở hồ sơ."; 
        }
    </script>
</body>
</html>
