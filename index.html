<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLG - Công cụ tạo Profile Siêu Tốc</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Times New Roman', serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .form-box { background: #1a1a1a; padding: 40px; border: 1px solid #c5a059; width: 100%; max-width: 450px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        h2 { color: #c5a059; text-align: center; letter-spacing: 3px; text-transform: uppercase; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #c5a059; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; outline: none; }
        input[type="file"] { font-size: 12px; }
        button { width: 100%; padding: 16px; background: #c5a059; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
        button:disabled { background: #444; color: #888; }
        #status { margin-top: 15px; font-size: 13px; text-align: center; color: #c5a059; font-style: italic; }
        #result-box { margin-top: 20px; padding: 15px; background: #000; border: 1px dashed #c5a059; display: none; word-break: break-all; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Tạo Hồ Sơ Tức Thì</h2>
        
        <label>Tên khách hàng:</label>
        <input type="text" id="name" placeholder="Ví dụ: Dennis Nguyen">
        
        <label>Số điện thoại khách:</label>
        <input type="text" id="phone" placeholder="Ví dụ: 602-xxx-xxxx">

        <label>Bảng báo giá (PDF):</label>
        <input type="file" id="pdf_file" accept=".pdf">

        <label>Hình ảnh chân dung (Nếu có):</label>
        <input type="file" id="img_file" accept="image/*">

        <label>Tên Tư vấn viên:</label>
        <input type="text" id="staff" placeholder="Nhập tên của bạn...">

        <button id="btn-gen" onclick="handleUpload()">Bắt đầu tạo link</button>
        
        <div id="status"></div>
        <div id="result-box">
            <span style="color: #c5a059; font-size: 12px; font-weight: bold;">LINK GỬI KHÁCH:</span>
            <div id="final-link" style="font-size: 11px; color: #aaa; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        async function uploadFile(file) {
            let formData = new FormData();
            formData.append("reqtype", "fileupload");
            formData.append("fileToUpload", file);
            // Dùng Catbox (Nhanh và ổn định hơn cho PDF)
            const res = await fetch("https://cors-anywhere.herokuapp.com/https://catbox.moe/user/api.php", { 
                method: "POST", 
                body: formData 
            });
            return await res.text();
        }

        async function uploadImage(file) {
            let formData = new FormData();
            formData.append("image", file);
            const res = await fetch("https://api.imgbb.com/1/upload?key=6d207e02198a847aa98d0a2a901485a5", { method: "POST", body: formData });
            const json = await res.json();
            return json.data.url;
        }

        async function handleUpload() {
            const btn = document.getElementById('btn-gen');
            const status = document.getElementById('status');
            const resBox = document.getElementById('result-box');
            
            const pdfFile = document.getElementById('pdf_file').files[0];
            const imgFile = document.getElementById('img_file').files[0];
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const staff = document.getElementById('staff').value;

            if (!pdfFile || !staff || !phone) { 
                alert("Vui lòng điền đủ thông tin!"); 
                return; 
            }

            btn.disabled = true;
            status.innerText = "⏳ Đang tăng tốc xử lý... Vui lòng đợi trong giây lát.";

            try {
                const pdfUrl = await uploadFile(pdfFile);
                let imgUrl = "";
                if (imgFile) { imgUrl = await uploadImage(imgFile); }

                const data = { n: name, p: phone, u: pdfUrl.trim(), i: imgUrl, s: staff };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const finalLink = window.location.href.split('?')[0].replace('index.html', '') + 'profile.html?d=' + encoded;
                
                status.innerText = "✅ Đã tạo xong!";
                resBox.style.display = "block";
                document.getElementById('final-link').innerText = finalLink;
            } catch (err) {
                status.innerText = "❌ Lỗi kết nối. Anh hãy thử nhấn lại lần nữa nhé!";
                console.error(err);
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
