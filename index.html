<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkSmart Insurance - Creator Pro</title>
    <style>
        :root { --primary-blue: #003366; --bg-gray: #f4f7f6; --text-dark: #333; }
        body { background-color: var(--bg-gray); color: var(--text-dark); font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .box { background: #fff; padding: 40px; border-radius: 8px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--primary-blue); }
        h2 { color: var(--primary-blue); text-align: center; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 1px; }
        label { display: block; margin-top: 20px; font-size: 13px; color: #666; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 16px; background: var(--primary-blue); color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 35px; text-transform: uppercase; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; text-align: center; color: #666; font-size: 14px; font-style: italic; }
        #result-box { margin-top: 25px; padding: 15px; background: #f0f4f8; border: 1px dashed var(--primary-blue); border-radius: 4px; display: none; }
        #final-link { word-break: break-all; font-size: 11px; color: #555; margin-top: 10px; cursor: pointer; font-family: monospace; padding: 5px; background: #fff; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ThinkSmart Portal</h2>
        <label>Tên khách hàng:</label>
        <input type="text" id="n" placeholder="Ví dụ: Dennis Nguyen">
        <label>Số điện thoại khách (US):</label>
        <input type="text" id="p" placeholder="(xxx) xxx-xxxx" maxlength="14">
        <label>Hình ảnh Banner:</label>
        <input type="file" id="img_file" accept="image/*">
        <label>Bảng báo giá PDF:</label>
        <input type="file" id="pdf_file" accept=".pdf">
        <label>Tên Tư vấn viên:</label>
        <input type="text" id="s" placeholder="Tên của bạn...">
        <button id="btn" onclick="handleUpload()">Bắt Đầu Tạo Link</button>
        <div id="status"></div>
        <div id="result-box">
            <span style="font-weight: bold; color: var(--primary-blue); font-size: 12px;">LINK GỬI KHÁCH:</span>
            <div id="final-link" onclick="copyText()"></div>
            <p style="font-size: 10px; color: #999; margin-top: 10px;">(Nhấn vào link để copy)</p>
        </div>
    </div>

    <script>
        // Tự động định dạng SĐT US
        document.getElementById('p').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        // Hàm upload dùng server trung gian uy tín để tránh lỗi CORS và kết nối
        async function uploadToCatbox(file) {
            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);
            
            // Sử dụng proxy để vượt lỗi kết nối nếu cần, hoặc gọi trực tiếp nếu server hỗ trợ
            const res = await fetch('https://tmpfiles.org/api/v1/upload', {
                method: 'POST',
                body: formData
            });
            const json = await res.json();
            return json.data.url.replace("tmpfiles.org/", "tmpfiles.org/dl/");
        }

        async function handleUpload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const resBox = document.getElementById('result-box');
            const linkDiv = document.getElementById('final-link');
            
            const pdfFile = document.getElementById('pdf_file').files[0];
            const imgFile = document.getElementById('img_file').files[0];
            const name = document.getElementById('n').value;
            const phone = document.getElementById('p').value;
            const staff = document.getElementById('s').value;

            if (!pdfFile || !imgFile || !staff) return alert("Anh Công ơi, chọn đủ cả Ảnh và PDF nhé!");

            btn.disabled = true;
            status.innerText = "⏳ Đang đẩy hồ sơ lên cloud... (Vui lòng chờ)";

            try {
                // Đẩy ảnh và PDF lên cùng một hệ thống cho đồng bộ
                const imgUrl = await uploadToCatbox(imgFile);
                status.innerText = "⏳ Đã xong ảnh, đang tải PDF...";
                const pdfUrl = await uploadToCatbox(pdfFile);

                const data = { n: name, p: phone, u: pdfUrl, i: imgUrl, s: staff };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const finalLink = window.location.href.split('?')[0].replace('index.html', '') + 'profile.html?d=' + encoded;
                
                status.innerText = "✅ Thành công rực rỡ!";
                resBox.style.display = "block";
                linkDiv.innerText = finalLink;
            } catch (err) {
                status.innerText = "❌ Lỗi kết nối mạng. Anh nhấn thử lại giúp em!";
            }
            btn.disabled = false;
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('final-link').innerText);
            alert("Đã copy link!");
        }
    </script>
</body>
</html>
