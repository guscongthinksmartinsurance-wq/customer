<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLG - Creator</title>
    <style>
        body { background: #121212; color: #fff; font-family: serif; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 30px; border: 1px solid #c5a059; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #c5a059; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #c5a059; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #c5a059; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; }
        button:disabled { background: #444; color: #888; }
        #status { margin-top: 15px; font-size: 13px; text-align: center; color: #c5a059; font-style: italic; }
        #result-box { margin-top: 20px; padding: 15px; background: #000; border: 1px dashed #c5a059; display: none; }
        #final-link { word-break: break-all; font-size: 12px; color: #aaa; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Tạo Hồ Sơ Tức Thì</h2>
        <label>Tên khách hàng:</label>
        <input type="text" id="n" placeholder="Tên khách...">
        <label>Số điện thoại:</label>
        <input type="text" id="p" placeholder="Ví dụ: 8304282519">
        <label>Bảng báo giá (PDF):</label>
        <input type="file" id="f" accept=".pdf">
        <label>Tên Tư vấn viên:</label>
        <input type="text" id="s" placeholder="Tên của bạn...">

        <button id="btn" onclick="handleUpload()">Bắt Đầu Tạo Link</button>
        <div id="status"></div>
        
        <div id="result-box">
            <span style="color: #c5a059; font-size: 12px; font-weight: bold;">LINK GỬI KHÁCH:</span>
            <div id="final-link" onclick="copyText()"></div>
            <p style="font-size: 10px; color: #666; margin-top: 10px;">(Nhấn vào link để copy)</p>
        </div>
    </div>

    <script>
        async function handleUpload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const resBox = document.getElementById('result-box');
            const linkDiv = document.getElementById('final-link');
            
            const file = document.getElementById('f').files[0];
            const name = document.getElementById('n').value;
            const phone = document.getElementById('p').value;
            const staff = document.getElementById('s').value;

            if (!file || !staff) return alert("Điền đủ thông tin anh nhé!");

            btn.disabled = true;
            status.innerText = "⏳ Đang kết nối server bảo mật...";

            try {
                // Sử dụng API upload cực nhanh và không lỗi CORS
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('https://tmpfiles.org/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const resData = await response.json();
                const fileUrl = resData.data.url.replace("tmpfiles.org/", "tmpfiles.org/dl/");

                const data = { n: name, p: phone, u: fileUrl, s: staff };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const finalLink = window.location.href.split('?')[0].replace('index.html', '') + 'profile.html?d=' + encoded;
                
                status.innerText = "✅ Thành công!";
                resBox.style.display = "block";
                linkDiv.innerText = finalLink;
            } catch (err) {
                status.innerText = "❌ Lỗi kết nối. Anh nhấn thử lại lần nữa nhé!";
            }
            btn.disabled = false;
        }

        function copyText() {
            const text = document.getElementById('final-link').innerText;
            navigator.clipboard.writeText(text);
            alert("Đã copy link!");
        }
    </script>
</body>
</html>
