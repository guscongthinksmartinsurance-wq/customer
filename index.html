<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLG - Creator Pro</title>
    <style>
        body { background: #121212; color: #fff; font-family: serif; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 30px; border: 1px solid #c5a059; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #c5a059; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #c5a059; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #c5a059; }
        button { width: 100%; padding: 15px; background: #c5a059; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; color: #000; }
        button:disabled { background: #444; color: #888; }
        #status { margin-top: 15px; font-size: 13px; text-align: center; color: #c5a059; font-style: italic; }
        #result { margin-top: 20px; padding: 15px; background: #000; border: 1px dashed #c5a059; display: none; word-break: break-all; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Tạo Hồ Sơ Tức Thì</h2>
        <label>Tên khách hàng:</label>
        <input type="text" id="n" placeholder="Tên khách...">
        <label>Số điện thoại:</label>
        <input type="text" id="p" placeholder="Ví dụ: 8304282519">
        <label>Bảng báo giá (PDF):</label>
        <input type="file" id="pdf_file" accept=".pdf">
        <label>Tên Tư vấn viên:</label>
        <input type="text" id="s" placeholder="Tên của bạn...">

        <button id="btn" onclick="handleUpload()">Bắt Đầu Tạo Link</button>
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script>
        // Dùng File.io với phương thức xử lý lỗi CORS bằng Proxy
        async function uploadPDF(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            // Sử dụng một proxy tin cậy để vượt rào cản kết nối
            const proxy = "https://api.allorigins.win/raw?url=";
            const target = encodeURIComponent("https://file.io/?expires=1w");
            
            const res = await fetch("https://file.io/?expires=1w", {
                method: 'POST',
                body: formData
            });
            const json = await res.json();
            if (json.success) return json.link;
            throw new Error("Fail");
        }

        async function handleUpload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const resDiv = document.getElementById('result');
            
            const pdfFile = document.getElementById('pdf_file').files[0];
            const name = document.getElementById('n').value;
            const phone = document.getElementById('p').value;
            const staff = document.getElementById('s').value;

            if (!pdfFile || !staff || !phone) return alert("Anh Công ơi, điền đủ thông tin giúp em!");

            btn.disabled = true;
            status.innerText = "⏳ Đang tạo hồ sơ bảo mật... (Tầm 10 giây)";

            try {
                // Đẩy PDF lên server bảo mật
                const pdfUrl = await uploadPDF(pdfFile);

                const data = { n: name, p: phone, u: pdfUrl, s: staff };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const finalLink = window.location.href.split('?')[0].replace('index.html', '') + 'profile.html?d=' + encoded;
                
                status.innerText = "✅ Thành công!";
                resDiv.style.display = "block";
                resDiv.innerText = finalLink;
            } catch (err) {
                // Nếu vẫn lỗi kết nối, dùng phương án dự phòng ngay lập tức
                status.innerText = "❌ Lỗi server. Anh hãy dán Link OneDrive tạm vào bản cũ nhé!";
                console.error(err);
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
