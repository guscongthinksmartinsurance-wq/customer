<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkSmart Portal - Creator</title>
    <style>
        :root { --navy: #003366; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .box { background: #fff; padding: 35px; border-radius: 12px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 6px solid var(--navy); }
        h2 { color: var(--navy); text-align: center; text-transform: uppercase; margin-bottom: 25px; font-size: 20px; }
        label { display: block; margin-top: 15px; font-size: 12px; color: #666; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 16px; background: var(--navy); color: #fff; border: none; border-radius: 6px; font-weight: bold; margin-top: 30px; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; text-align: center; color: #666; font-size: 13px; font-style: italic; }
        #result-box { margin-top: 25px; padding: 15px; background: #eef2f7; border: 1px dashed var(--navy); border-radius: 6px; display: none; }
        #final-link { word-break: break-all; font-size: 13px; color: var(--navy); margin-top: 10px; cursor: pointer; padding: 10px; background: #fff; border: 1px solid #ddd; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ThinkSmart Portal</h2>
        <label>Tên khách hàng:</label>
        <input type="text" id="n" placeholder="Dennis Nguyen">
        <label>Số điện thoại US:</label>
        <input type="text" id="p" placeholder="(xxx) xxx-xxxx" maxlength="14">
        <label>Hình ảnh Banner quảng cáo:</label>
        <input type="file" id="img_file" accept="image/*">
        <label>File PDF Báo giá:</label>
        <input type="file" id="pdf_file" accept=".pdf">
        <label>Tên Tư vấn viên:</label>
        <input type="text" id="s" placeholder="Tên của bạn...">
        <button id="btn" onclick="handleUpload()">Tạo Link Hồ Sơ</button>
        <div id="status"></div>
        <div id="result-box">
            <span style="font-weight: bold; color: var(--navy); font-size: 12px;">LINK GỬI KHÁCH:</span>
            <div id="final-link" onclick="copyText()"></div>
            <p style="font-size: 10px; color: #999; margin-top: 10px;">(Nhấn vào link để copy)</p>
        </div>
    </div>

    <script>
        document.getElementById('p').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            // Sử dụng dịch vụ chuẩn, ổn định và link cực ngắn
            const res = await fetch('https://tmpfiles.org/api/v1/upload', {
                method: 'POST',
                body: formData
            });
            const json = await res.json();
            return json.data.url.replace("tmpfiles.org/", "tmpfiles.org/dl/");
        }

        async function handleUpload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const imgFile = document.getElementById('img_file').files[0];
            const pdfFile = document.getElementById('pdf_file').files[0];

            if (!imgFile || !pdfFile) return alert("Anh Công chọn đủ Ảnh và PDF nhé!");

            btn.disabled = true;
            status.innerText = "⏳ Đang kết nối server bảo mật...";

            try {
                status.innerText = "⏳ Bước 1/2: Đang tải hình ảnh...";
                const imgUrl = await uploadFile(imgFile);
                
                status.innerText = "⏳ Bước 2/2: Đang tải hồ sơ PDF...";
                const pdfUrl = await uploadFile(pdfFile);

                const data = {
                    n: document.getElementById('n').value,
                    p: document.getElementById('p').value,
                    i: imgUrl,
                    u: pdfUrl,
                    s: document.getElementById('s').value
                };

                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const finalLink = window.location.href.split('?')[0].replace('index.html', '') + 'profile.html?d=' + encoded;

                status.innerText = "✅ Thành công!";
                document.getElementById('result-box').style.display = "block";
                document.getElementById('final-link').innerText = finalLink;
            } catch (err) {
                status.innerText = "❌ Lỗi kết nối. Anh hãy nhấn lại hoặc dùng 4G nhé!";
            }
            btn.disabled = false;
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('final-link').innerText);
            alert("Đã copy link hồ sơ!");
        }
    </script>
</body>
</html>
