<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLG - Creator</title>
    <style>
        body { background: #121212; color: #fff; font-family: serif; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 30px; border: 1px solid #c5a059; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #c5a059; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #c5a059; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #c5a059; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        #result { margin-top: 20px; padding: 15px; background: #000; border: 1px dashed #c5a059; display: none; word-break: break-all; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Tạo Hồ Sơ Khách</h2>
        <label>Tên khách hàng:</label>
        <input type="text" id="n" placeholder="Ví dụ: Anh Dennis">
        <label>Số điện thoại:</label>
        <input type="text" id="p" placeholder="Ví dụ: 8304282519">
        <label>Link PDF (OneDrive):</label>
        <input type="text" id="u" placeholder="Dán link PDF vào đây...">
        <label>Tên Tư vấn viên:</label>
        <input type="text" id="s" placeholder="Tên của bạn...">
        <button onclick="gen()">Tạo Link Gửi Khách</button>
        <div id="result"></div>
    </div>
    <script>
        function gen() {
            const d = {
                n: document.getElementById('n').value,
                p: document.getElementById('p').value,
                u: document.getElementById('u').value,
                s: document.getElementById('s').value
            };
            if(!d.u || !d.s) return alert("Vui lòng nhập Link PDF và Tên tư vấn!");
            // Mã hóa an toàn cho URL
            const str = btoa(encodeURIComponent(JSON.stringify(d)));
            const link = window.location.href.replace('index.html', '') + 'profile.html?d=' + str;
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').innerText = link;
        }
    </script>
</body>
</html>
