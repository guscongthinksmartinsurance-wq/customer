<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkSmart Insurance - Creator Pro</title>
    <style>
        /* Tông màu chủ đạo: Xanh Navy Vững chãi (Corporate Blue) */
        :root {
            --primary-blue: #003366; 
            --accent-blue: #0056b3;
            --bg-gray: #f4f7f6;
            --text-dark: #333;
        }

        body { 
            background-color: var(--bg-gray); 
            color: var(--text-dark); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; /* Font chữ website lớn */
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0; 
        }

        .box { 
            background: #fff; 
            padding: 40px; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Bóng nhẹ chuyên nghiệp */
            border-top: 5px solid var(--primary-blue); 
        }

        h2 { 
            color: var(--primary-blue); 
            text-align: center; 
            font-weight: 700; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
        }

        label { 
            display: block; 
            margin-top: 20px; 
            font-size: 13px; 
            color: #666; 
            font-weight: 600; 
            text-transform: uppercase; 
        }

        input[type="text"], input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            background: #fff; 
            border: 1px solid #ddd; 
            color: var(--text-dark); 
            box-sizing: border-box; 
            border-radius: 4px; 
            outline: none; 
            font-size: 15px; 
        }

        input:focus { 
            border-color: var(--primary-blue); 
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); 
        }

        input[type="file"] { 
            font-size: 12px; 
            background: #fafafa; 
            cursor: pointer; 
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background-color: var(--primary-blue); 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 35px; 
            text-transform: uppercase; 
            transition: 0.2s; 
        }

        button:hover { 
            background-color: var(--accent-blue); 
        }

        button:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }

        #status { 
            margin-top: 15px; 
            font-size: 14px; 
            text-align: center; 
            color: #666; 
        }

        #result-box { 
            margin-top: 25px; 
            padding: 15px; 
            background: #f0f4f8; 
            border: 1px dashed var(--primary-blue); 
            border-radius: 4px; 
            display: none; 
        }

        #final-link { 
            word-break: break-all; 
            font-size: 12px; 
            color: #555; 
            margin-top: 10px; 
            cursor: pointer; 
            font-family: monospace; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>ThinkSmart Portal</h2>
        
        <label>Tên khách hàng:</label>
        <input type="text" id="n" placeholder="Ví dụ: Dennis Nguyen">
        
        <label>Số điện thoại khách (US):</label>
        <input type="text" id="p" placeholder="(xxx) xxx-xxxx" maxlength="14">

        <label>Bảng báo giá PDF:</label>
        <input type="file" id="f" accept=".pdf">

        <label>Tên Tư vấn viên hỗ trợ:</label>
        <input type="text" id="s" placeholder="Nhập tên của bạn...">

        <button id="btn" onclick="handleUpload()">Tạo Profile Bảo Mật</button>
        
        <div id="status"></div>
        
        <div id="result-box">
            <span style="color: var(--primary-blue); font-size: 13px; font-weight: bold;">LINK HỒ SƠ:</span>
            <div id="final-link" onclick="copyText()"></div>
            <p style="font-size: 11px; color: #666; margin-top: 10px;">(Nhấn vào link để copy)</p>
        </div>
    </div>

    <script>
        // --- CHỨC NĂNG TỰ ĐỘNG ĐỊNH DẠNG SĐT CHUẨN MỸ ---
        const phoneInput = document.getElementById('p');
        phoneInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        // --- CHỨC NĂNG UPLOAD ---
        async function handleUpload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const resBox = document.getElementById('result-box');
            const linkDiv = document.getElementById('final-link');
            
            const file = document.getElementById('f').files[0];
            const name = document.getElementById('n').value;
            const phone = document.getElementById('p').value;
            const staff = document.getElementById('s').value;

            // Kiểm tra SĐT có đủ độ dài chuẩn (14 ký tự bao gồm ngoặc và gạch)
            if (!file || !staff || phone.length < 14) { 
                alert("Vui lòng điền đủ thông tin và Số điện thoại chuẩn Mỹ!"); 
                return; 
            }

            btn.disabled = true;
            status.innerText = "⏳ Đang kết nối server bảo mật... (Tầm 10 giây)";

            try {
                // Upload PDF trực tiếp (tmpfiles.org)
                const formData = new FormData();
                formData.append('file', file);
                const response = await fetch('https://tmpfiles.org/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });
                const resData = await response.json();
                const fileUrl = resData.data.url.replace("tmpfiles.org/", "tmpfiles.org/dl/");

                // Mã hóa dữ liệu
                const data = { n: name, p: phone, u: fileUrl, s: staff };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const finalLink = window.location.href.split('?')[0].replace('index.html', '') + 'profile.html?d=' + encoded;
                
                status.innerText = "✅ Thành công!";
                resBox.style.display = "block";
                linkDiv.innerText = finalLink;
            } catch (err) {
                status.innerText = "❌ Lỗi kết nối. Anh Công hãy thử lại nhé!";
            }
            btn.disabled = false;
        }

        function copyText() {
            const text = document.getElementById('final-link').innerText;
            navigator.clipboard.writeText(text);
            alert("Đã copy link hồ sơ!");
        }
    </script>
</body>
</html>
