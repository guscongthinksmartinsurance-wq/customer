<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLG - Công cụ tạo Profile Siêu Tốc</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Times New Roman', serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .form-box { background: #1a1a1a; padding: 40px; border: 1px solid #c5a059; width: 100%; max-width: 450px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        h2 { color: #c5a059; text-align: center; letter-spacing: 3px; text-transform: uppercase; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #c5a059; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #c5a059; }
        button { width: 100%; padding: 16px; background: #c5a059; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; }
        #result-box { margin-top: 20px; padding: 15px; background: #000; border: 1px dashed #c5a059; display: none; word-break: break-all; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Tạo Hồ Sơ Siêu Tốc</h2>
        
        <label>Tên khách hàng:</label>
        <input type="text" id="name" placeholder="Nhập tên khách...">
        
        <label>Link PDF (OneDrive/Google Drive):</label>
        <input type="text" id="pdf_url" placeholder="Dán link tài liệu vào đây...">

        <label>Link Hình ảnh (Nếu có):</label>
        <input type="text" id="img_url" placeholder="Dán link ảnh vào đây...">

        <label>Tên Tư vấn viên:</label>
        <input type="text" id="staff" placeholder="Tên của bạn...">

        <button onclick="generate()">Tạo link ngay lập tức</button>
        
        <div id="result-box">
            <span style="color: #c5a059; font-size: 12px;">LINK GỬI KHÁCH:</span>
            <div id="final-link" style="font-size: 11px; color: #aaa; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        function generate() {
            const data = {
                n: document.getElementById('name').value || "Khách hàng",
                u: document.getElementById('pdf_url').value,
                i: document.getElementById('img_url').value,
                s: document.getElementById('staff').value
            };

            if(!data.u || !data.s) { alert("Vui lòng nhập Link tài liệu và Tên tư vấn viên!"); return; }

            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const finalLink = window.location.href.split('?')[0].replace('index.html', '') + 'profile.html?d=' + encoded;
            
            document.getElementById('result-box').style.display = "block";
            document.getElementById('final-link').innerText = finalLink;
        }
    </script>
</body>
</html>
