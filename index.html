<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLG - Creator Pro</title>
    <style>
        body { background: #121212; color: #fff; font-family: serif; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 30px; border: 1px solid #c5a059; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #c5a059; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #c5a059; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #c5a059; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        button:disabled { background: #444; color: #888; }
        #prog-bar { width: 0%; height: 4px; background: #c5a059; margin-top: 10px; transition: 0.3s; }
        #status { margin-top: 10px; font-size: 13px; text-align: center; color: #c5a059; }
        #result { margin-top: 20px; padding: 15px; background: #000; border: 1px dashed #c5a059; display: none; word-break: break-all; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Tạo Hồ Sơ Tức Thì</h2>
        <label>Tên khách hàng:</label>
        <input type="text" id="n" placeholder="Tên khách...">
        <label>Số điện thoại:</label>
        <input type="text" id="p" placeholder="Ví dụ: 8304282519">
        <label>Bảng báo giá (PDF):</label>
        <input type="file" id="pdf_file" accept=".pdf">
        <label>Hình ảnh (Nếu có):</label>
        <input type="file" id="img_file" accept="image/*">
        <label>Tên Tư vấn viên:</label>
        <input type="text" id="s" placeholder="Tên của bạn...">

        <button id="btn" onclick="handleUpload()">Bắt Đầu Tạo Link</button>
        <div id="prog-bar"></div>
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script>
        // Dùng server upload của Transfersh - cực kỳ trâu bò và nhanh
        async function uploadFile(file) {
            const res = await fetch(`https://transfer.sh/${file.name}`, {
                method: 'PUT',
                body: file
            });
            return await res.text();
        }

        async function uploadImage(file) {
            let formData = new FormData();
            formData.append("image", file);
            const res = await fetch("https://api.imgbb.com/1/upload?key=6d207e02198a847aa98d0a2a901485a5", { method: "POST", body: formData });
            const json = await res.json();
            return json.data.url;
        }

        async function handleUpload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const prog = document.getElementById('prog-bar');
            const resDiv = document.getElementById('result');
            
            const pdfFile = document.getElementById('pdf_file').files[0];
            const imgFile = document.getElementById('img_file').files[0];
            const name = document.getElementById('n').value;
            const phone = document.getElementById('p').value;
            const staff = document.getElementById('s').value;

            if (!pdfFile || !staff) return alert("Điền đủ tên và chọn PDF anh Công nhé!");

            btn.disabled = true;
            prog.style.width = "30%";
            status.innerText = "⏳ Đang đẩy file lên server bảo mật...";

            try {
                // Upload PDF sang transfer.sh (Lưu 14 ngày, rất nhanh)
                const pdfUrl = await uploadFile(pdfFile);
                prog.style.width = "70%";
                
                let imgUrl = "";
                if (imgFile) {
                    imgUrl = await uploadImage(imgFile);
                }

                const data = { n: name, p: phone, u: pdfUrl.trim(), i: imgUrl, s: staff };
                const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
                const finalLink = window.location.href.replace('index.html', '') + 'profile.html?d=' + encoded;
                
                prog.style.width = "100%";
                status.innerText = "✅ Thành công!";
                resDiv.style.display = "block";
                resDiv.innerText = finalLink;
            } catch (err) {
                status.innerText = "❌ Lỗi kết nối. Anh nhấn lại lần nữa là được!";
                prog.style.width = "0%";
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
