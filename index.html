<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkSmart Insurance - Creator Pro</title>
    <style>
        :root { --primary-blue: #003366; --accent-blue: #0056b3; --bg-gray: #f4f7f6; --text-dark: #333; }
        body { background-color: var(--bg-gray); color: var(--text-dark); font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .box { background: #fff; padding: 40px; border-radius: 8px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--primary-blue); }
        h2 { color: var(--primary-blue); text-align: center; text-transform: uppercase; margin-bottom: 30px; }
        label { display: block; margin-top: 20px; font-size: 13px; color: #666; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary-blue); }
        button { width: 100%; padding: 16px; background: var(--primary-blue); color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 30px; text-transform: uppercase; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; text-align: center; color: #666; font-size: 14px; }
        #result-box { margin-top: 25px; padding: 15px; background: #f0f4f8; border: 1px dashed var(--primary-blue); display: none; }
        #final-link { word-break: break-all; font-size: 11px; color: #555; margin-top: 10px; cursor: pointer; font-family: monospace; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ThinkSmart Portal</h2>
        
        <label>Tên khách hàng:</label>
        <input type="text" id="n" placeholder="Ví dụ: Dennis Nguyen">
        
        <label>Số điện thoại khách (US):</label>
        <input type="text" id="p" placeholder="(xxx) xxx-xxxx" maxlength="14">

        <label>Hình ảnh quảng cáo (Banner):</label>
        <input type="file" id="img_file" accept="image/*">

        <label>Bảng báo giá PDF:</label>
        <input type="file" id="pdf_file" accept=".pdf">

        <label>Tên Tư vấn viên:</label>
        <input type="text" id="s" placeholder="Nhập tên của bạn...">

        <button id="btn" onclick="handleUpload()">Tạo Profile Gửi Khách</button>
        <div id="status"></div>
        <div id="result-box">
            <span style="font-weight: bold; color: var(--primary-blue);">LINK HỒ SƠ:</span>
            <div id="final-link" onclick="copyText()"></div>
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('p');
        phoneInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        async function uploadFile(file, isImage) {
            const formData = new FormData();
            if (isImage) {
                formData.append('image', file);
                const res = await fetch('https://api.imgbb.com/1/upload?key=6d207e02198a847aa98d0a2a901485a5', { method: 'POST', body: formData });
                const json = await res.json();
                return json.data.url;
            } else {
                formData.append('file', file);
                const res = await fetch('https://tmpfiles.org/api/v1/upload', { method: 'POST', body: formData });
                const json = await res.json();
                return json.data.url.replace("tmpfiles.org/", "tmpfiles.org/dl/");
            }
        }

        async function handleUpload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const pdfFile = document.getElementById('pdf_file').files[0];
            const imgFile = document.getElementById('img_file').files[0];
            const name = document.getElementById('n').value;
            const phone = document.getElementById('p').value;
            const staff = document.getElementById('s').value;

            if (!pdfFile || !staff || !imgFile) return alert("Vui lòng chọn cả ảnh quảng cáo và file PDF!");

            btn.disabled = true;
            status.innerText = "⏳ Đang tải tài liệu lên hệ thống...";

            try {
                const imgUrl = await uploadFile(imgFile, true);
                const pdfUrl = await uploadFile(pdfFile, false);

                const data = { n: name, p: phone, u: pdfUrl, i: imgUrl, s: staff };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const finalLink = window.location.href.split('?')[0].replace('index.html', '') + 'profile.html?d=' + encoded;
                
                status.innerText = "✅ Hoàn tất!";
                document.getElementById('result-box').style.display = "block";
                document.getElementById('final-link').innerText = finalLink;
            } catch (err) {
                status.innerText = "❌ Lỗi kết nối. Thử lại nhát nữa anh Công nhé!";
            }
            btn.disabled = false;
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('final-link').innerText);
            alert("Đã copy link!");
        }
    </script>
</body>
</html>
